<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfileCard</title>
    <link rel="stylesheet" href="profileCard.css" />
</head>
<body>
    <!-- create main container -->
    <div class="profile-card">
        <!-- create img container -->
        <div class="img-contain">
            <!-- apply image -->
                <img src="./assest/images (1).jpg" alt="Profile photo of Vijay Singh" />
        </div>
        <!-- create content container -->
        <div class="content">
            <!-- create name -->
                <h2 class="profile-name">Vijay Singh</h2>
                <!-- create role -->
                <h3 class="profile-role">Frontend Developer</h3>
                <!-- create description -->
                <p class="profile-desc ">
                    Passionate frontend developer focused on clean UI,<br/>
                    responsive design, and user-friendly experiences.
                </p>
                <!-- create button -->
                <button class="profile-btn" id="btn">View Profile</button>
        </div>
    </div>

    <script src="profileCard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFILE</title>
    <link rel="stylesheet" href="profile.css"/>
</head>
<body>
    <!-- create main profile container -->
    <main class="profile-container">
        <!-- create profile card container -->
        <article class="profile-card">
            <!-- create image container -->
            <div class="image-container">
                <img src="./assest/man-avtar.png" alt="Harsh-pandit-img" height="150px"/>
            </div>
            <!-- create content container  -->
            <section class="content">
                <h2 class="profile-name">Harsh Pandit</h2>
                <h4 class="profile-role">Full Stack Developer</h4>
                <p class="profile-description">
                    Passionate frontend developer focused on clean UI,
                    responsive design, and user-friendly experiences.
                </p>
                <!-- create button container  -->
                <div class="button-group">
                    <!-- create view button -->
                    <button class="btn">View Profile</button>
                    <!-- create hire button -->
                    <button class="btn">Hire Me</button>
                </div>
            </section>
        </article>
    </main>
</body>
</html>
